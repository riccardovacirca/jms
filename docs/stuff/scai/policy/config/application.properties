# ============================================================================
# MODULO POLICY - Configurazione
# ============================================================================

# Modulo
module.name=policy
module.version=1.0.0
module.type=entity
module.description=Gestione Policy Accessi Rapporti - Sistema SCAI

# Backend
backend.type=laravel
backend.version=9+
backend.database=postgresql

# Frontend
frontend.type=lit
frontend.route=/policy
frontend.entry-point=policy/index.js

# API Endpoints - Policy Rapporto
api.base-path=/api/scai/policy
api.list=GET /api/scai/policy
api.detail=GET /api/scai/policy/{id}
api.create=POST /api/scai/policy
api.update=PUT /api/scai/policy/{id}
api.delete=DELETE /api/scai/policy/{id}

# API Endpoints - Policy Default Sede
api.default.list=GET /api/scai/policy/default
api.default.detail=GET /api/scai/policy/default/{id}
api.default.create=POST /api/scai/policy/default
api.default.update=PUT /api/scai/policy/default/{id}
api.default.delete=DELETE /api/scai/policy/default/{id}

# API Endpoints - Policy Rapporto Validity
api.validity.list=GET /api/scai/policy/validity
api.validity.detail=GET /api/scai/policy/validity/{id}
api.validity.create=POST /api/scai/policy/validity
api.validity.update=PUT /api/scai/policy/validity/{id}
api.validity.delete=DELETE /api/scai/policy/validity/{id}

# Database
db.table.policy=scai_policy_rapporto
db.table.default=scai_policy_default_sede
db.table.validity=scai_policy_rapporto_validity
db.migration=migration/V20260304_000025__policy.sql

# Dipendenze
dependencies.required=ente,sede,rapporti,sdc,repertorio
dependencies.optional=

# Installation
installation.order=25
