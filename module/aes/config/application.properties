# AES Module - File Cleanup
# aes.temp.retention.days: numero di giorni dopo i quali i file temporanei vengono eliminati (default: 7)
aes.temp.retention.days=7

# AES Module - File Storage Paths
# Path base per file gestiti dal modulo aes.
# In sviluppo:   ./storage/ è montata via bind mount su /app/storage/ nel container.
# In produzione: /app/storage/ è montata su un Docker named volume: <project>-storage.
aes.resources.base=/app/storage/aes
aes.resources.tmp=/app/storage/aes/tmp
aes.resources.documents=/app/storage/aes/documents

# AES Module - Savino Remote Signature Platform (DM7/Conserva)
# savino.enabled=false disabilita l'integrazione con Savino (default: disabilitato)
# savino.endpoint: URL base della piattaforma Savino (es. https://savino.example.com)
# savino.username, savino.password: credenziali per autenticazione dm7auth
# savino.default.tablet.id: ID tablet predefinito per operazioni firma remota
savino.enabled=false
savino.endpoint=
savino.username=
savino.password=
savino.default.tablet.id=

# AES Module - Namirial Remote Signature Platform (DM7/Conserva)
# namirial.enabled=false disabilita l'integrazione con Namirial (default: disabilitato)
# namirial.endpoint: URL base della piattaforma Namirial (es. https://namirial.example.com)
# namirial.username, namirial.password: credenziali per autenticazione dm7auth
# namirial.default.tablet.id: ID tablet predefinito per operazioni firma remota
namirial.enabled=false
namirial.endpoint=
namirial.username=
namirial.password=
namirial.default.tablet.id=

# AES Module - Tablet Configuration
# Tablet configurations are loaded from JSON files in /app/config/tablets/
# Each JSON file must follow the TabletConfig schema: { tabletName, tabletApp, tabletDepartment, tabletId }
# Files are loaded automatically at runtime — no application restart needed
# Example: /app/config/tablets/sales.json, /app/config/tablets/hr.json
