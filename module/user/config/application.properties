# Cookie Security (modulo user)
# user.cookie.secure=true abilita il flag Secure sui cookie di autenticazione (richiede HTTPS)
# user.cookie.samesite: Strict (massima protezione CSRF) | Lax (bilanciato, consigliato) | None (richiede Secure=true)
user.cookie.secure=false
user.cookie.samesite=Lax

# Rate Limiting (protezione brute-force globale)
# Applicato a: login, 2FA, reset password, forgot password
user.ratelimit.max.attempts=5
user.ratelimit.window.seconds=300

# Root Account (creato automaticamente all'avvio se configurato)
# L'utente root ha username fisso "root" e ruolo admin con tutti i privilegi
# (can_admin, can_write, can_delete, can_send_mail)
# Se password e email sono configurati, l'account viene creato alla prima esecuzione
# (solo se non esiste già)
root.password=
root.email=
