<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>CRM Mock</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  color:#222;
  transition:0.3s;
}

/* DARK MODE */
body.dark {
  background:#1e1e1e;
  color:#eee;
}
body.dark .topbar,
body.dark .bottombar {
  background:#2a2a2a;
}
body.dark .control { background:#444; }
body.dark .campaign { color:#bbb; }

/* TOP BAR */
.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#fff;
  padding:10px 20px;
  border-bottom:1px solid #ddd;
}

.menu {
  display:flex;
  gap:20px;
  align-items:center;
}

.right {
  display:flex;
  align-items:center;
  gap:10px;
}

/* BADGE */
.badge {
  background:red;
  color:#fff;
  border-radius:50%;
  padding:2px 6px;
  font-size:12px;
}

/* BUTTONS */
.btn {
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.btn-red { background:#e74c3c; color:#fff; }
.btn-green { background:#2ecc71; color:#fff; }

/* USER */
.user {
  position:relative;
}
.avatar {
  width:35px;
  height:35px;
  border-radius:50%;
  background:#999;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  cursor:pointer;
}
.dropdown {
  position:absolute;
  right:0;
  top:45px;
  background:#fff;
  border:1px solid #ddd;
  border-radius:5px;
  display:none;
  min-width:150px;
}
body.dark .dropdown { background:#2a2a2a; }
.dropdown div {
  padding:10px;
  cursor:pointer;
}
.dropdown div:hover {
  background:#eee;
}
body.dark .dropdown div:hover {
  background:#444;
}

/* CENTER */
.center {
  text-align:center;
  margin-top:80px;
}
.status {
  color:#3aa27c;
  font-size:50px;
  font-weight:bold;
}
.timer {
  font-size:80px;
  margin:20px 0;
  font-family:monospace;
}
.campaign {
  color:#777;
  font-size:24px;
}

/* BOTTOM */
.bottombar {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  border-top:1px solid #ddd;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}
.control {
  padding:8px 14px;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
}
.control.red { background:#e74c3c; color:#fff; }
.control.blue { background:#4c6ef5; color:#fff; }

/* CHAT */
.chat {
  position:fixed;
  bottom:70px;
  right:20px;
  background:#6c5ce7;
  color:#fff;
  padding:10px 15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="menu">
    <strong>sidial</strong>
    <span>Manuali</span>
    <span>Chiamate</span>
    <span>Richiami <span class="badge">21</span></span>
  </div>

  <div class="right">
    <button class="btn btn-red">Pausa</button>
    <button class="btn btn-green">Riprendi</button>
    <button class="btn" onclick="toggleTheme()">🌙</button>

    <div class="user">
      <div class="avatar" onclick="toggleMenu()">U</div>
      <div class="dropdown" id="dropdown">
        <div>Profilo</div>
        <div>Impostazioni</div>
        <div>Logout</div>
      </div>
    </div>
  </div>
</div>

<div class="center">
  <div class="status">IN ATTESA</div>
  <div class="timer">00:47</div>
  <div class="campaign">VODAFONE MARZO TOTALE</div>
</div>

<div class="bottombar">
  <div class="control red">Riaggancia</div>
  <div class="control">Attiva muto</div>
  <div class="control blue">Cuffie - / +</div>
  <div class="control blue">Mic - / +</div>
  <div class="control">Mostra toni</div>
</div>

<div class="chat">Chat</div>

<script>
function toggleTheme() {
  document.body.classList.toggle('dark');
}

function toggleMenu() {
  const menu = document.getElementById('dropdown');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

// chiudi dropdown cliccando fuori
document.addEventListener('click', function(e){
  if(!e.target.closest('.user')) {
    document.getElementById('dropdown').style.display = 'none';
  }
});
</script>

</body>
</html>
