# ============================================================
# Configurazione applicazione — modificare manualmente se necessario
# Le variabili d'ambiente hanno precedenza (es. DB_HOST sovrascrive db.host)
# ============================================================

# Server
server.port=8080
app.base.url={{APP_BASE_URL}}

# Database (PostgreSQL)
# In sviluppo: db.host è il nome del container sulla rete Docker
# In produzione: sostituire con hostname o IP del server PostgreSQL
db.host=postgres
db.port=5432
db.name={{PROJECT_NAME}}
db.user={{PROJECT_NAME}}
db.password={{PGSQL_PASSWORD}}
db.pool.size={{DB_POOL_SIZE}}

# JWT
# jwt.secret deve essere una stringa lunga e casuale — cambiarla in produzione
jwt.secret={{JWT_SECRET}}
jwt.access.expiry.seconds={{JWT_ACCESS_EXPIRY_SECONDS}}

# Async Handler
# async.pool.size: dimensione thread pool per handler @Async (default: 20)
# async.max.body.size: dimensione massima body per handler async in bytes (default: 10MB)
async.pool.size={{ASYNC_POOL_SIZE}}
async.max.body.size={{ASYNC_MAX_BODY_SIZE}}

# Mail (SMTP)
# mail.enabled=false disabilita completamente l'invio email (default: disabilitato).
# In sviluppo: abilitare con mail.enabled=true e usare Mailpit (./install.sh --mailpit), poi aprire http://localhost:8025
# In produzione: abilitare e sostituire host/credenziali con un relay SMTP reale (es. Gmail, Brevo, SendGrid)
mail.enabled={{MAIL_ENABLED}}
mail.host={{MAILPIT_HOST}}
mail.port={{MAILPIT_SMTP_PORT}}
mail.auth={{MAIL_AUTH}}
mail.user={{MAILPIT_USER}}
mail.password={{MAILPIT_PASSWORD}}
mail.from={{MAIL_FROM}}

# Scheduler (JobRunr)
# scheduler.enabled=false disabilita completamente lo scheduler (default: abilitato).
# scheduler.poll.interval.seconds: ogni quanti secondi il background job server controlla nuovi job (default: 15)
scheduler.enabled={{SCHEDULER_ENABLED}}
scheduler.poll.interval.seconds={{SCHEDULER_POLL_INTERVAL_SECONDS}}

