# ============================================================================
# MODULO BADGE - Configurazione
# ============================================================================

# Modulo
module.name=badge
module.version=1.0.0
module.type=entity
module.description=Gestione Anagrafica Badge - Sistema SCAI

# Backend
backend.type=laravel
backend.version=9+
backend.database=postgresql

# Frontend
frontend.type=lit
frontend.route=/badge
frontend.entry-point=badge/index.js

# API Endpoints - Badge
api.base-path=/api/scai/badge
api.list=GET /api/scai/badge
api.detail=GET /api/scai/badge/{id}
api.create=POST /api/scai/badge
api.update=PUT /api/scai/badge/{id}
api.delete=DELETE /api/scai/badge/{id}

# API Endpoints - Badge Tipo (Lookup interno)
api.tipo.list=GET /api/scai/badge/tipo
api.tipo.detail=GET /api/scai/badge/tipo/{id}
api.tipo.create=POST /api/scai/badge/tipo
api.tipo.update=PUT /api/scai/badge/tipo/{id}
api.tipo.delete=DELETE /api/scai/badge/tipo/{id}

# API Endpoints - Badge Causale (Lookup interno)
api.causale.list=GET /api/scai/badge/causale
api.causale.detail=GET /api/scai/badge/causale/{id}
api.causale.create=POST /api/scai/badge/causale
api.causale.update=PUT /api/scai/badge/causale/{id}
api.causale.delete=DELETE /api/scai/badge/causale/{id}

# API Endpoints - Badge Request
api.request.list=GET /api/scai/badge/request
api.request.detail=GET /api/scai/badge/request/{id}
api.request.create=POST /api/scai/badge/request
api.request.update=PUT /api/scai/badge/request/{id}
api.request.delete=DELETE /api/scai/badge/request/{id}

# Database
db.table.badge=scai_badge
db.table.tipo=scai_badge_tipo
db.table.causale=scai_badge_causale_emissione
db.table.request=scai_badge_request
db.migration=migration/V20260304_000030__badge.sql

# Dipendenze
dependencies.required=ente,rapporti
dependencies.optional=

# Installation
installation.order=30

# ⚠️ NOTA IMPORTANTE
# Questo modulo presenta un'inconsistenza nel design del database:
# - scai_badge usa id_ente (BIGINT FK)
# - scai_badge_request usa cod_ente (VARCHAR natural key)
# Vedere migration per dettagli e soluzioni proposte
